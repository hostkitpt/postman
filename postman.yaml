openapi: 3.0.3
info:
  title: Hostkit API
  version: "1.0"
  description: Public Hostkit API collection for Postman.
servers:
  - url: "{baseUrl}"
    variables:
      baseUrl:
        default: https://app.hostkit.pt/api
        description: Hostkit API base URL.
security:
  - ApiKeyQuery: []

tags:
  - name: Account
  - name: Properties
  - name: Reservations
  - name: Guests
  - name: Smartlocks
  - name: Invoicing
  - name: Expenses
  - name: SIBA

paths:
  /getLicense:
    get:
      tags: [Account]
      operationId: getLicense
      summary: Get account license plan and expiration date
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getProperties:
    get:
      tags: [Properties]
      operationId: getProperties
      summary: List properties visible to the API key
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getProperty:
    get:
      tags: [Properties]
      operationId: getProperty
      summary: Get the property attached to the API key
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addProperty:
    get:
      tags: [Properties]
      operationId: addProperty
      summary: Create a property and return its API key
      parameters:
        - $ref: "#/components/parameters/property_name_required"
        - $ref: "#/components/parameters/address_required"
        - $ref: "#/components/parameters/zip_required"
        - $ref: "#/components/parameters/city_required"
        - $ref: "#/components/parameters/latitude"
        - $ref: "#/components/parameters/longitude"
        - $ref: "#/components/parameters/default_checkin"
        - $ref: "#/components/parameters/default_checkout"
        - $ref: "#/components/parameters/license_number"
        - $ref: "#/components/parameters/license_type"
        - $ref: "#/components/parameters/typology"
        - $ref: "#/components/parameters/siba_id"
        - $ref: "#/components/parameters/siba_order"
        - $ref: "#/components/parameters/siba_code"
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/invoicing_name"
        - $ref: "#/components/parameters/invoicing_email"
        - $ref: "#/components/parameters/invoicing_phone"
        - $ref: "#/components/parameters/invoicing_address"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /updateProperty:
    get:
      tags: [Properties]
      operationId: updateProperty
      summary: Update the property attached to the API key
      parameters:
        - $ref: "#/components/parameters/property_name"
        - $ref: "#/components/parameters/address"
        - $ref: "#/components/parameters/zip"
        - $ref: "#/components/parameters/city"
        - $ref: "#/components/parameters/latitude"
        - $ref: "#/components/parameters/longitude"
        - $ref: "#/components/parameters/default_checkin"
        - $ref: "#/components/parameters/default_checkout"
        - $ref: "#/components/parameters/license_number"
        - $ref: "#/components/parameters/license_type"
        - $ref: "#/components/parameters/siba_id"
        - $ref: "#/components/parameters/siba_order"
        - $ref: "#/components/parameters/siba_code"
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/invoicing_name"
        - $ref: "#/components/parameters/invoicing_email"
        - $ref: "#/components/parameters/invoicing_phone"
        - $ref: "#/components/parameters/invoicing_address"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getReservations:
    get:
      tags: [Reservations]
      operationId: getReservations
      summary: List reservations filtered by check-in, checkout, or reservation date
      description: Provide at least one of from_date, to_date, or reservation_date.
      parameters:
        - $ref: "#/components/parameters/from_date"
        - $ref: "#/components/parameters/to_date"
        - $ref: "#/components/parameters/date_filter"
        - $ref: "#/components/parameters/reservation_date"
        - $ref: "#/components/parameters/get_archived"
        - $ref: "#/components/parameters/room"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getReservation:
    get:
      tags: [Reservations]
      operationId: getReservation
      summary: Get one reservation by Hostkit reservation code
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/get_archived"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getReservationByCmId:
    get:
      tags: [Reservations]
      operationId: getReservationByCmId
      summary: Get one reservation by channel manager and reservation ID
      parameters:
        - $ref: "#/components/parameters/channelmanager_required"
        - $ref: "#/components/parameters/id_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addReservation:
    get:
      tags: [Reservations]
      operationId: addReservation
      summary: Create a reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
        - $ref: "#/components/parameters/check_in_required"
        - $ref: "#/components/parameters/check_out_required"
        - $ref: "#/components/parameters/pax"
        - $ref: "#/components/parameters/email"
        - $ref: "#/components/parameters/phone"
        - $ref: "#/components/parameters/received_amount"
        - $ref: "#/components/parameters/host_commission"
        - $ref: "#/components/parameters/cleaning_fee"
        - $ref: "#/components/parameters/extra_fees"
        - $ref: "#/components/parameters/city_tax"
        - $ref: "#/components/parameters/provider"
        - $ref: "#/components/parameters/reservation_date"
        - $ref: "#/components/parameters/room"
        - $ref: "#/components/parameters/beds"
        - $ref: "#/components/parameters/private_note"
        - $ref: "#/components/parameters/service_notes"
        - $ref: "#/components/parameters/vat_number"
        - $ref: "#/components/parameters/vat_name"
        - $ref: "#/components/parameters/flight"
        - $ref: "#/components/parameters/flight_time"
        - $ref: "#/components/parameters/arrival_by"
        - $ref: "#/components/parameters/block_sef"
        - $ref: "#/components/parameters/create_payment"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /updateReservation:
    get:
      tags: [Reservations]
      operationId: updateReservation
      summary: Update a reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
        - $ref: "#/components/parameters/check_in"
        - $ref: "#/components/parameters/check_out"
        - $ref: "#/components/parameters/pax"
        - $ref: "#/components/parameters/email"
        - $ref: "#/components/parameters/phone"
        - $ref: "#/components/parameters/received_amount"
        - $ref: "#/components/parameters/host_commission"
        - $ref: "#/components/parameters/cleaning_fee"
        - $ref: "#/components/parameters/extra_fees"
        - $ref: "#/components/parameters/city_tax"
        - $ref: "#/components/parameters/provider"
        - $ref: "#/components/parameters/room"
        - $ref: "#/components/parameters/beds"
        - $ref: "#/components/parameters/private_note"
        - $ref: "#/components/parameters/service_notes"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /cancelReservation:
    get:
      tags: [Reservations]
      operationId: cancelReservation
      summary: Move a reservation to cancellations
      parameters:
        - $ref: "#/components/parameters/rcode_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /deleteReservation:
    get:
      tags: [Reservations]
      operationId: deleteReservation
      summary: Permanently delete a reservation and related records
      parameters:
        - $ref: "#/components/parameters/rcode_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getPayments:
    get:
      tags: [Reservations]
      operationId: getPayments
      summary: Get all payments for one reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getOnlineCheckin:
    get:
      tags: [Reservations]
      operationId: getOnlineCheckin
      summary: Get online check-in link and status
      parameters:
        - $ref: "#/components/parameters/rcode_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addGuest:
    get:
      tags: [Guests]
      operationId: addGuest
      summary: Add guest data to a reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
        - $ref: "#/components/parameters/nationality"
        - $ref: "#/components/parameters/birthday"
        - $ref: "#/components/parameters/doc_id"
        - $ref: "#/components/parameters/doc_type"
        - $ref: "#/components/parameters/doc_country"
        - $ref: "#/components/parameters/arrival"
        - $ref: "#/components/parameters/departure"
        - $ref: "#/components/parameters/country_residence"
        - $ref: "#/components/parameters/city_residence"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /removeGuest:
    get:
      tags: [Guests]
      operationId: removeGuest
      summary: Remove one guest from a reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /removeAllGuests:
    get:
      tags: [Guests]
      operationId: removeAllGuests
      summary: Remove all guest data from a reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getKeycode:
    get:
      tags: [Smartlocks]
      operationId: getKeycode
      summary: Get smartlock keycode or invite code
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/smartlock_provider_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getInvoices:
    get:
      tags: [Invoicing]
      operationId: getInvoices
      summary: List invoices or filter a specific invoice
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/customer_id"
        - $ref: "#/components/parameters/date_start"
        - $ref: "#/components/parameters/date_end"
        - $ref: "#/components/parameters/doc_type"
        - $ref: "#/components/parameters/source"
        - $ref: "#/components/parameters/show_property"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getReservationInvoices:
    get:
      tags: [Invoicing]
      operationId: getReservationInvoices
      summary: List invoices for one reservation
      parameters:
        - $ref: "#/components/parameters/rcode_required"
        - $ref: "#/components/parameters/invoicing_nif"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getReceipts:
    get:
      tags: [Invoicing]
      operationId: getReceipts
      summary: List receipts or filter a specific receipt
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/customer_id"
        - $ref: "#/components/parameters/date_start"
        - $ref: "#/components/parameters/date_end"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getCreditNotes:
    get:
      tags: [Invoicing]
      operationId: getCreditNotes
      summary: List credit notes or filter a specific credit note
      parameters:
        - $ref: "#/components/parameters/invoice_type"
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id"
        - $ref: "#/components/parameters/customer_id"
        - $ref: "#/components/parameters/date_start"
        - $ref: "#/components/parameters/date_end"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addInvoice:
    get:
      tags: [Invoicing]
      operationId: addInvoice
      summary: Create an open invoice document
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/invoice_type"
        - $ref: "#/components/parameters/customer_id_required"
        - $ref: "#/components/parameters/customer_name_required"
        - $ref: "#/components/parameters/country_required"
        - $ref: "#/components/parameters/address"
        - $ref: "#/components/parameters/cp"
        - $ref: "#/components/parameters/city"
        - $ref: "#/components/parameters/rcode"
        - $ref: "#/components/parameters/comment"
        - $ref: "#/components/parameters/payment_method"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addInvoiceLine:
    get:
      tags: [Invoicing]
      operationId: addInvoiceLine
      summary: Add a line to an open invoice
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id_required"
        - $ref: "#/components/parameters/invoice_type"
        - $ref: "#/components/parameters/product_id_required"
        - $ref: "#/components/parameters/custom_descr_required"
        - $ref: "#/components/parameters/qty_required"
        - $ref: "#/components/parameters/price_required"
        - $ref: "#/components/parameters/discount_required"
        - $ref: "#/components/parameters/vat_required"
        - $ref: "#/components/parameters/reason_code_required"
        - $ref: "#/components/parameters/region"
        - $ref: "#/components/parameters/product_type"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /closeInvoice:
    get:
      tags: [Invoicing]
      operationId: closeInvoice
      summary: Close an open invoice
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id_required"
        - $ref: "#/components/parameters/invoice_type"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /deleteInvoice:
    get:
      tags: [Invoicing]
      operationId: deleteInvoice
      summary: Delete an open invoice
      parameters:
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/series"
        - $ref: "#/components/parameters/id_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addReceipt:
    get:
      tags: [Invoicing]
      operationId: addReceipt
      summary: Create a receipt for an FT invoice
      parameters:
        - $ref: "#/components/parameters/refseries_required"
        - $ref: "#/components/parameters/refid_required"
        - $ref: "#/components/parameters/invoicing_nif"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /addCreditNote:
    get:
      tags: [Invoicing]
      operationId: addCreditNote
      summary: Create a credit note for a closed invoice
      parameters:
        - $ref: "#/components/parameters/refseries_required"
        - $ref: "#/components/parameters/refid_required"
        - $ref: "#/components/parameters/invoicing_nif"
        - $ref: "#/components/parameters/invoice_type"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getSAFT:
    get:
      tags: [Invoicing]
      operationId: getSAFT
      summary: Get a generated SAF-T file as base64
      parameters:
        - $ref: "#/components/parameters/invoicing_nif_required"
        - $ref: "#/components/parameters/year_required"
        - $ref: "#/components/parameters/month_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /generateSAFT:
    get:
      tags: [Invoicing]
      operationId: generateSAFT
      summary: Generate a SAF-T file
      parameters:
        - $ref: "#/components/parameters/invoicing_nif_required"
        - $ref: "#/components/parameters/year_required"
        - $ref: "#/components/parameters/month_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getExpenses:
    get:
      tags: [Expenses]
      operationId: getExpenses
      summary: List expenses by document date range
      parameters:
        - $ref: "#/components/parameters/date_start_required"
        - $ref: "#/components/parameters/date_end_required"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /getLastSIBADate:
    get:
      tags: [SIBA]
      operationId: getLastSIBADate
      summary: Get the last successfully submitted SIBA bulletin date
      responses:
        "200": { $ref: "#/components/responses/TextResponse" }

  /validateSIBA:
    get:
      tags: [SIBA]
      operationId: validateSIBA
      summary: Validate SIBA data for a reservation or explicit guest data
      parameters:
        - $ref: "#/components/parameters/rcode"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
        - $ref: "#/components/parameters/nationality"
        - $ref: "#/components/parameters/birthday"
        - $ref: "#/components/parameters/doc_id"
        - $ref: "#/components/parameters/doc_type"
        - $ref: "#/components/parameters/doc_country"
        - $ref: "#/components/parameters/arrival"
        - $ref: "#/components/parameters/departure"
        - $ref: "#/components/parameters/country_residence"
        - $ref: "#/components/parameters/city_residence"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

  /sendSIBA:
    get:
      tags: [SIBA]
      operationId: sendSIBA
      summary: Submit SIBA data for a reservation or explicit guest data
      parameters:
        - $ref: "#/components/parameters/rcode"
        - $ref: "#/components/parameters/name"
        - $ref: "#/components/parameters/first_name"
        - $ref: "#/components/parameters/last_name"
        - $ref: "#/components/parameters/nationality"
        - $ref: "#/components/parameters/birthday"
        - $ref: "#/components/parameters/doc_id"
        - $ref: "#/components/parameters/doc_type"
        - $ref: "#/components/parameters/doc_country"
        - $ref: "#/components/parameters/arrival"
        - $ref: "#/components/parameters/departure"
        - $ref: "#/components/parameters/country_residence"
        - $ref: "#/components/parameters/city_residence"
      responses:
        "200": { $ref: "#/components/responses/JsonResponse" }

components:
  securitySchemes:
    ApiKeyQuery:
      type: apiKey
      in: query
      name: APIKEY

  responses:
    JsonResponse:
      description: JSON response. Errors are returned as JSON objects with an error field.
      content:
        application/json:
          schema: {}
    TextResponse:
      description: Text or JSON response.
      content:
        text/plain:
          schema:
            type: string
        application/json:
          schema: {}

  parameters:
    id:
      name: id
      in: query
      schema: { type: string }
    id_required:
      name: id
      in: query
      required: true
      schema: { type: string }
    rcode:
      name: rcode
      in: query
      schema: { type: string }
    rcode_required:
      name: rcode
      in: query
      required: true
      schema: { type: string }
    channelmanager_required:
      name: channelmanager
      in: query
      required: true
      schema: { type: string }

    from_date:
      name: from_date
      in: query
      schema: { type: string, format: date }
    to_date:
      name: to_date
      in: query
      schema: { type: string, format: date }
    reservation_date:
      name: reservation_date
      in: query
      schema: { type: string, format: date }
    date_filter:
      name: date_filter
      in: query
      schema:
        type: string
        enum: [checkin, checkout]
    get_archived:
      name: get_archived
      in: query
      schema:
        type: string
        enum: ["true", "false"]

    invoicing_nif:
      name: invoicing_nif
      in: query
      schema: { type: string }
    invoicing_nif_required:
      name: invoicing_nif
      in: query
      required: true
      schema: { type: string }
    invoicing_name:
      name: invoicing_name
      in: query
      schema: { type: string }
    invoicing_email:
      name: invoicing_email
      in: query
      schema: { type: string, format: email }
    invoicing_phone:
      name: invoicing_phone
      in: query
      schema: { type: string }
    invoicing_address:
      name: invoicing_address
      in: query
      schema: { type: string }
    series:
      name: series
      in: query
      schema: { type: string }
    customer_id:
      name: customer_id
      in: query
      schema: { type: string }
    customer_id_required:
      name: customer_id
      in: query
      required: true
      schema: { type: string }
    customer_name_required:
      name: name
      in: query
      required: true
      schema: { type: string }
    date_start:
      name: date_start
      in: query
      schema: { type: string, description: Unix timestamp }
    date_start_required:
      name: date_start
      in: query
      required: true
      schema: { type: string, description: Unix timestamp }
    date_end:
      name: date_end
      in: query
      schema: { type: string, description: Unix timestamp }
    date_end_required:
      name: date_end
      in: query
      required: true
      schema: { type: string, description: Unix timestamp }
    doc_type:
      name: doc_type
      in: query
      schema: { type: string }
    source:
      name: source
      in: query
      schema: { type: string }
    show_property:
      name: show_property
      in: query
      schema:
        type: integer
        enum: [0, 1]
    invoice_type:
      name: invoice_type
      in: query
      schema:
        type: string
        enum: [FR, FT]
    refseries_required:
      name: refseries
      in: query
      required: true
      schema: { type: string }
    refid_required:
      name: refid
      in: query
      required: true
      schema: { type: string }
    year_required:
      name: year
      in: query
      required: true
      schema: { type: string, pattern: "^[0-9]{4}$" }
    month_required:
      name: month
      in: query
      required: true
      schema: { type: string }

    product_id_required:
      name: product_id
      in: query
      required: true
      schema: { type: string }
    custom_descr_required:
      name: custom_descr
      in: query
      required: true
      schema: { type: string }
    qty_required:
      name: qty
      in: query
      required: true
      schema: { type: string }
    price_required:
      name: price
      in: query
      required: true
      schema: { type: string }
    discount_required:
      name: discount
      in: query
      required: true
      schema: { type: string }
    vat_required:
      name: vat
      in: query
      required: true
      schema: { type: string }
    reason_code_required:
      name: reason_code
      in: query
      required: true
      schema: { type: string }
    region:
      name: region
      in: query
      schema:
        type: string
        enum: [PT, PT-MA, PT-AC]
    product_type:
      name: type
      in: query
      schema:
        type: string
        enum: [S, P, I]

    smartlock_provider_required:
      name: provider
      in: query
      required: true
      schema:
        type: string
