info:
  name: Hostkit API
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json
  description: Public Hostkit API collection for Postman.

auth:
  type: apikey
  apikey:
    - key: key
      value: APIKEY
      type: string
    - key: value
      value: "{{APIKEY}}"
      type: string
    - key: in
      value: query
      type: string

variable:
  - key: baseUrl
    value: https://app.hostkit.pt/api
  - key: APIKEY
    value: your-api-key

item:
  - name: Account
    item:
      - name: getLicense
        request:
          method: GET
          url: "{{baseUrl}}/getLicense"

  - name: Properties
    item:
      - name: getProperties
        request:
          method: GET
          url: "{{baseUrl}}/getProperties"

      - name: getProperty
        request:
          method: GET
          url: "{{baseUrl}}/getProperty"

      - name: addProperty
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addProperty?property_name=&address=&zip=&city="
            query:
              - key: property_name
                value: ""
              - key: address
                value: ""
              - key: zip
                value: ""
              - key: city
                value: ""
              - key: latitude
                value: ""
                disabled: true
              - key: longitude
                value: ""
                disabled: true
              - key: default_checkin
                value: ""
                disabled: true
              - key: default_checkout
                value: ""
                disabled: true
              - key: license_number
                value: ""
                disabled: true
              - key: license_type
                value: ""
                disabled: true
              - key: typology
                value: ""
                disabled: true

      - name: updateProperty
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/updateProperty"
            query:
              - key: property_name
                value: ""
                disabled: true
              - key: address
                value: ""
                disabled: true
              - key: zip
                value: ""
                disabled: true
              - key: city
                value: ""
                disabled: true
              - key: latitude
                value: ""
                disabled: true
              - key: longitude
                value: ""
                disabled: true

  - name: Reservations
    item:
      - name: getReservations
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getReservations?from_date=2026-01-01&to_date=2026-01-31"
            query:
              - key: from_date
                value: "2026-01-01"
              - key: to_date
                value: "2026-01-31"
              - key: date_filter
                value: checkin
                disabled: true
              - key: reservation_date
                value: ""
                disabled: true
              - key: get_archived
                value: "true"
                disabled: true
              - key: room
                value: ""
                disabled: true

      - name: getReservation
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getReservation?rcode="
            query:
              - key: rcode
                value: ""
              - key: get_archived
                value: "true"
                disabled: true

      - name: getReservationByCmId
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getReservationByCmId?channelmanager=&id="
            query:
              - key: channelmanager
                value: ""
              - key: id
                value: ""

      - name: addReservation
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addReservation?rcode=&check_in=2026-01-01&check_out=2026-01-02"
            query:
              - key: rcode
                value: ""
              - key: check_in
                value: "2026-01-01"
              - key: check_out
                value: "2026-01-02"
              - key: name
                value: ""
                disabled: true
              - key: first_name
                value: ""
                disabled: true
              - key: last_name
                value: ""
                disabled: true
              - key: pax
                value: ""
                disabled: true
              - key: email
                value: ""
                disabled: true
              - key: phone
                value: ""
                disabled: true
              - key: received_amount
                value: ""
                disabled: true
              - key: provider
                value: ""
                disabled: true
              - key: reservation_date
                value: ""
                disabled: true

      - name: updateReservation
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/updateReservation?rcode="
            query:
              - key: rcode
                value: ""
              - key: check_in
                value: ""
                disabled: true
              - key: check_out
                value: ""
                disabled: true
              - key: name
                value: ""
                disabled: true
              - key: email
                value: ""
                disabled: true
              - key: phone
                value: ""
                disabled: true

      - name: cancelReservation
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/cancelReservation?rcode="
            query:
              - key: rcode
                value: ""

      - name: deleteReservation
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/deleteReservation?rcode="
            query:
              - key: rcode
                value: ""

      - name: getPayments
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getPayments?rcode="
            query:
              - key: rcode
                value: ""

      - name: getOnlineCheckin
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getOnlineCheckin?rcode="
            query:
              - key: rcode
                value: ""

      - name: addReservationExtra
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addReservationExtra?rcode=&name=&value="
            query:
              - key: rcode
                value: ""
              - key: name
                value: ""
              - key: value
                value: ""

      - name: deleteReservationExtras
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/deleteReservationExtras?rcode="
            query:
              - key: rcode
                value: ""

  - name: Guests
    item:
      - name: addGuest
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addGuest?rcode=&first_name=&last_name="
            query:
              - key: rcode
                value: ""
              - key: first_name
                value: ""
              - key: last_name
                value: ""

      - name: removeGuest
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/removeGuest?rcode=&id="
            query:
              - key: rcode
                value: ""
              - key: id
                value: ""

      - name: removeAllGuests
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/removeAllGuests?rcode="
            query:
              - key: rcode
                value: ""

  - name: Smartlocks
    item:
      - name: getKeycode
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getKeycode?rcode=&provider="
            query:
              - key: rcode
                value: ""
              - key: provider
                value: ""

  - name: Invoicing
    item:
      - name: getInvoices
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getInvoices?from_date=2026-01-01&to_date=2026-01-31"
            query:
              - key: from_date
                value: "2026-01-01"
              - key: to_date
                value: "2026-01-31"

      - name: getReservationInvoices
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getReservationInvoices?rcode="
            query:
              - key: rcode
                value: ""

      - name: getReceipts
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getReceipts?from_date=2026-01-01&to_date=2026-01-31"
            query:
              - key: from_date
                value: "2026-01-01"
              - key: to_date
                value: "2026-01-31"

      - name: getCreditNotes
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getCreditNotes?from_date=2026-01-01&to_date=2026-01-31"
            query:
              - key: from_date
                value: "2026-01-01"
              - key: to_date
                value: "2026-01-31"

      - name: addInvoice
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addInvoice?rcode="
            query:
              - key: rcode
                value: ""

      - name: addInvoiceLine
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addInvoiceLine?invoice=&description=&value="
            query:
              - key: invoice
                value: ""
              - key: description
                value: ""
              - key: value
                value: ""

      - name: closeInvoice
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/closeInvoice?invoice="
            query:
              - key: invoice
                value: ""

      - name: deleteInvoice
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/deleteInvoice?invoice="
            query:
              - key: invoice
                value: ""

      - name: addReceipt
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addReceipt?invoice="
            query:
              - key: invoice
                value: ""

      - name: addCreditNote
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/addCreditNote?invoice="
            query:
              - key: invoice
                value: ""

      - name: generateSAFT
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/generateSAFT?year=2026&month=1"
            query:
              - key: year
                value: "2026"
              - key: month
                value: "1"

      - name: getSAFT
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getSAFT?year=2026&month=1"
            query:
              - key: year
                value: "2026"
              - key: month
                value: "1"

  - name: Expenses
    item:
      - name: getExpenses
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/getExpenses?from_date=2026-01-01&to_date=2026-01-31"
            query:
              - key: from_date
                value: "2026-01-01"
              - key: to_date
                value: "2026-01-31"

  - name: SIBA
    item:
      - name: getLastSIBADate
        request:
          method: GET
          url: "{{baseUrl}}/getLastSIBADate"

      - name: validateSIBA
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/validateSIBA?rcode="
            query:
              - key: rcode
                value: ""

      - name: sendSIBA
        request:
          method: GET
          url:
            raw: "{{baseUrl}}/sendSIBA?rcode="
            query:
              - key: rcode
                value: ""
